<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="docTitle">Markdown to TXT/PDF Converter</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f1115">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MD Converter">
<style>
  :root{
    --bg:#0f1115;
    --panel:#171a21;
    --border:#2a2e38;
    --accent:#7c9eff;
    --accent-dark:#5b7cff;
    --folder:#e8b463;
    --text:#e7e9ee;
    --muted:#9aa1af;
    --dim:#5c6270;
    --ok:#4ade80;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    display:flex;
    align-items:flex-start;
    justify-content:center;
    padding:24px;
  }
  .card{
    width:100%;
    max-width:680px;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:16px;
    padding:32px;
  }
  .headerRow{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:16px;
  }
  h1{
    font-size:1.4rem;
    margin:0 0 6px;
  }
  p.subtitle{
    color:var(--muted);
    margin:0 0 28px;
    font-size:0.95rem;
    line-height:1.5;
  }
  .langSelect{
    flex-shrink:0;
    font:inherit;
    font-size:0.82rem;
    background:#1c2030;
    color:var(--text);
    border:1px solid var(--border);
    border-radius:8px;
    padding:7px 10px;
    cursor:pointer;
  }
  .langSelect:focus{outline:none; border-color:var(--accent);}

  .drop{
    border:2px dashed var(--border);
    border-radius:12px;
    padding:36px 20px;
    text-align:center;
    cursor:pointer;
    transition:border-color .15s, background .15s;
    display:block;
  }
  .drop:hover, .drop.dragover{
    border-color:var(--accent);
    background:#1c2030;
  }
  .drop svg{
    width:36px;
    height:36px;
    stroke:var(--muted);
    margin-bottom:10px;
  }
  .drop strong{color:var(--text);}
  .drop span{
    display:block;
    color:var(--muted);
    font-size:0.85rem;
    margin-top:4px;
  }
  input[type=file]{display:none;}
  .status{
    margin-top:20px;
    font-size:0.9rem;
    color:var(--muted);
    min-height:20px;
  }
  .status.error{color:#f87171;}
  .status.ok{color:var(--ok);}

  .progressBox{
    margin-top:16px;
    display:none;
  }
  .progressBox.show{display:block;}
  .progressLabel{
    display:flex;
    justify-content:space-between;
    font-size:0.8rem;
    color:var(--muted);
    margin-bottom:6px;
  }
  .progressTrack{
    width:100%;
    height:8px;
    background:#1c2030;
    border:1px solid var(--border);
    border-radius:999px;
    overflow:hidden;
  }
  .progressFill{
    height:100%;
    width:0%;
    background:linear-gradient(90deg, var(--accent-dark), var(--accent));
    border-radius:999px;
    transition:width .15s ease;
  }

  .listActions{
    display:none;
    gap:8px;
    margin-top:18px;
    flex-wrap:wrap;
  }
  .listActions.show{display:flex;}
  .listActions button{
    padding:6px 12px;
    font-size:0.8rem;
    background:transparent;
    color:var(--muted);
    border:1px solid var(--border);
    border-radius:8px;
    cursor:pointer;
  }
  .listActions button:hover{color:var(--text); border-color:var(--muted);}

  .treeWrap{
    margin-top:10px;
    max-height:340px;
    overflow-y:auto;
    border:1px solid var(--border);
    border-radius:10px;
    display:none;
    padding:6px 0;
  }
  .treeWrap.show{display:block;}

  .tree-row{
    display:flex;
    align-items:center;
    gap:6px;
    padding:6px 10px;
    cursor:pointer;
    user-select:none;
    border-radius:6px;
  }
  .tree-row:hover{background:#1c2030;}

  .tree-toggle{
    width:16px;
    height:16px;
    flex-shrink:0;
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--muted);
    transition:transform .12s ease;
  }
  .tree-toggle.open{transform:rotate(90deg);}
  .tree-toggle.spacer{visibility:hidden;}

  .tree-row input[type=checkbox]{
    flex-shrink:0;
    accent-color:var(--accent);
    width:15px;
    height:15px;
    cursor:pointer;
  }
  .tree-row input[type=checkbox]:disabled{
    opacity:0.25;
    cursor:default;
  }

  .tree-icon{
    width:18px;
    height:18px;
    flex-shrink:0;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .tree-icon svg{width:100%; height:100%;}

  .tree-name{
    font-size:0.87rem;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .folder-row .tree-name{
    color:var(--text);
    font-weight:600;
  }
  .file-row .tree-name{
    color:var(--muted);
  }
  .file-row.is-md .tree-name{
    color:var(--text);
    font-weight:400;
  }
  .file-row.non-md{
    opacity:0.55;
  }
  .file-row.non-md .tree-name{
    font-style:italic;
  }
  .tree-badge{
    font-size:0.65rem;
    color:var(--dim);
    border:1px solid var(--border);
    border-radius:5px;
    padding:1px 5px;
    margin-left:4px;
    flex-shrink:0;
  }

  .summary{
    display:flex;
    gap:20px;
    margin-top:20px;
    flex-wrap:wrap;
  }
  .stat{
    background:#1c2030;
    border:1px solid var(--border);
    border-radius:10px;
    padding:10px 16px;
    font-size:0.85rem;
  }
  .stat b{
    display:block;
    font-size:1.15rem;
    color:var(--accent);
  }

  .filenameBox{
    margin-top:20px;
    display:none;
  }
  .filenameBox.show{display:block;}
  .filenameBox .fieldLabel{
    display:block;
    font-size:0.85rem;
    color:var(--muted);
    margin-bottom:6px;
  }
  .filenameBox input[type=text]{
    width:100%;
    font:inherit;
    background:#1c2030;
    border:1px solid var(--border);
    border-radius:8px;
    padding:10px 12px;
    color:var(--text);
    font-size:0.9rem;
  }
  .filenameBox input[type=text]:focus{
    outline:none;
    border-color:var(--accent);
  }
  .fsapiHint{
    font-size:0.78rem;
    color:var(--muted);
    margin-top:6px;
    line-height:1.4;
  }

  .actions{
    margin-top:24px;
    display:flex;
    gap:12px;
    flex-wrap:wrap;
  }
  button.btn{
    font:inherit;
    border:none;
    border-radius:10px;
    padding:12px 20px;
    font-size:0.95rem;
    cursor:pointer;
    transition:background .15s, opacity .15s;
  }
  #downloadTxtBtn{
    background:var(--accent);
    color:#0f1115;
    font-weight:600;
  }
  #downloadTxtBtn:hover{background:var(--accent-dark);}
  #downloadPdfBtn{
    background:#2a2e38;
    color:var(--text);
    font-weight:600;
    border:1px solid var(--border);
  }
  #downloadPdfBtn:hover{border-color:var(--accent);}
  button.btn:disabled{
    opacity:0.4;
    cursor:not-allowed;
  }
  #resetBtn{
    background:transparent;
    color:var(--muted);
    border:1px solid var(--border);
  }
  #resetBtn:hover{color:var(--text); border-color:var(--muted);}
</style>
</head>
<body>

<div class="card">
  <div class="headerRow">
    <div>
      <h1 id="pageTitle">Markdown to TXT/PDF Converter</h1>
      <p class="subtitle" id="subtitleText"></p>
    </div>
    <select class="langSelect" id="langSelect">
      <option value="en">English</option>
      <option value="pt">Português</option>
      <option value="es">Español</option>
    </select>
  </div>

  <label class="drop" id="dropZone">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7Z"/>
    </svg>
    <strong id="dropTitle"></strong>
    <span id="dropSubtitle"></span>
    <input type="file" id="folderInput" webkitdirectory directory multiple>
  </label>

  <div class="status" id="status"></div>

  <div class="progressBox" id="progressBox">
    <div class="progressLabel">
      <span id="progressText"></span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progressTrack">
      <div class="progressFill" id="progressFill"></div>
    </div>
  </div>

  <div class="listActions" id="listActions">
    <button id="selectAllBtn"></button>
    <button id="selectNoneBtn"></button>
    <button id="expandAllBtn"></button>
    <button id="collapseAllBtn"></button>
  </div>

  <div class="treeWrap" id="treeWrap"></div>

  <div class="summary" id="summary" style="display:none;">
    <div class="stat"><b id="statTotal">0</b><span id="statTotalLabel"></span></div>
    <div class="stat"><b id="statMd">0</b><span id="statMdLabel"></span></div>
    <div class="stat"><b id="statIncluded">0</b><span id="statIncludedLabel"></span></div>
  </div>

  <div class="filenameBox" id="filenameBox">
    <label class="fieldLabel" id="filenameLabel" for="filenameInput"></label>
    <input type="text" id="filenameInput">
    <div class="fsapiHint" id="fsapiHint"></div>
  </div>

  <div class="actions">
    <button class="btn" id="downloadTxtBtn" disabled></button>
    <button class="btn" id="downloadPdfBtn" disabled></button>
    <button class="btn" id="resetBtn"></button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
/* ---------- i18n ---------- */
const I18N = {

    pageTitle: "Markdown to TXT/PDF Converter",

    statusReady: (n) => `Pronto. Foram encontrados ${n} arquivo(s) Markdown. Use a árvore de pastas para abrir ou fechar diretórios e escolher o que converter.`,

    btnSelectNone: "Desmarcar todos",
    btnExpandAll: "Abrir todas as pastas",

  es: {

    dropTitle: "Haz clic para seleccionar una carpeta",
    dropSubtitle: "o arrastra una carpeta aquí",
    statusNoFilesInFolder: "No se encontraron archivos en esa carpeta.",
    statusReadingDragged: "Leyendo archivos de la carpeta arrastrada…",
    statusNoFilesFound: "No se encontraron archivos.",
    statusReadingFiles: "Leyendo archivos…",
    statusNoMdFound: "No se encontraron archivos .md en esa carpeta.",
    statusReady: (n) => `Listo. Se encontraron ${n} archivo(s) Markdown. Usa el árbol de carpetas para abrir o cerrar directorios y elegir qué convertir.`,

    statusTxtSaved: "El archivo .txt se guardó correctamente.",
    statusPdfSaved: "El archivo .pdf se guardó correctamente.",
    statusDownloadCancelled: "Descarga cancelada.",
    progressReading: "Leyendo archivos…",
    progressBuildingTxt: "Generando el archivo .txt…",
    progressBuildingPdf: "Generando el archivo .pdf…",

    btnSelectNone: "Deseleccionar todo",

    statIncludedLabel: "seleccionados para conversión",
    filenameLabel: "Nombre del archivo de salida",
    filenamePlaceholder: "archivos-convertidos",
    fsapiHintSupported: "Al descargar, el navegador te permitirá elegir la carpeta de destino y sobrescribir un archivo existente si lo necesitas.",

    btnDownloadPdf: "Descargar .pdf",
    btnReset: "Limpiar",
    defaultFilenameSuffix: "archivos-md"
  }
};

let currentLang = 'en';
function t(key, ...args){
  const dict = I18N[currentLang] || I18N.en;
  const val = dict[key];
  return typeof val === 'function' ? val(...args) : val;
}

/* ---------- ícones ---------- */
const ICONS = {
  folderClosed: `<svg viewBox="0 0 24 24" fill="none"><path d="M3 7a1 1 0 0 1 1-1h5l2 2h9a1 1 0 0 1 1 1v9a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V7Z" fill="#e8b463" opacity="0.9"/></svg>`,
  folderOpen: `<svg viewBox="0 0 24 24" fill="none"><path d="M3 7a1 1 0 0 1 1-1h5l2 2h8a1 1 0 0 1 1 1l-1.5 8.5a1 1 0 0 1-1 .8H4.8a1 1 0 0 1-1-.8L2 9.4A1 1 0 0 1 3 8Z" fill="#e8b463"/></svg>`,
  fileMd: `<svg viewBox="0 0 24 24" fill="none"><path d="M6 2h8l4 4v16H6V2Z" fill="#7c9eff" opacity="0.85"/><path d="M14 2v4h4" fill="none" stroke="#0f1115" stroke-width="1"/></svg>`,
  fileOther: `<svg viewBox="0 0 24 24" fill="none"><path d="M6 2h8l4 4v16H6V2Z" fill="#5c6270" opacity="0.8"/><path d="M14 2v4h4" fill="none" stroke="#171a21" stroke-width="1"/></svg>`,
  chevron: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>`
};

/* ---------- elementos ---------- */
const folderInput = document.getElementById('folderInput');
const dropZone = document.getElementById('dropZone');
const statusEl = document.getElementById('status');
const treeWrap = document.getElementById('treeWrap');
const downloadTxtBtn = document.getElementById('downloadTxtBtn');
const downloadPdfBtn = document.getElementById('downloadPdfBtn');
const resetBtn = document.getElementById('resetBtn');
const summaryEl = document.getElementById('summary');
const statTotal = document.getElementById('statTotal');
const statMd = document.getElementById('statMd');
const statIncluded = document.getElementById('statIncluded');
const listActions = document.getElementById('listActions');
const selectAllBtn = document.getElementById('selectAllBtn');
const selectNoneBtn = document.getElementById('selectNoneBtn');
const expandAllBtn = document.getElementById('expandAllBtn');
const collapseAllBtn = document.getElementById('collapseAllBtn');
const progressBox = document.getElementById('progressBox');
const progressFill = document.getElementById('progressFill');
const progressPct = document.getElementById('progressPct');
const progressText = document.getElementById('progressText');
const filenameBox = document.getElementById('filenameBox');
const filenameInput = document.getElementById('filenameInput');
const fsapiHint = document.getElementById('fsapiHint');
const langSelect = document.getElementById('langSelect');

const SUPPORTS_SAVE_PICKER = 'showSaveFilePicker' in window;

let rootFolderName = 'folder';
let mdEntries = [];   // {path, text, include}
let treeRoot = null;  // nó raiz da árvore (representa a pasta selecionada)
let lastFilenameWasAuto = true; // controla se o nome do arquivo ainda é o sugerido automaticamente

/* ---------- aplicar traduções na interface estática ---------- */
function applyStaticTexts(){
  document.getElementById('docTitle').textContent = t('docTitle');
  document.getElementById('pageTitle').textContent = t('pageTitle');
  document.getElementById('subtitleText').textContent = t('subtitle');
  document.getElementById('dropTitle').textContent = t('dropTitle');
  document.getElementById('dropSubtitle').textContent = t('dropSubtitle');

  selectAllBtn.textContent = t('btnSelectAll');
  selectNoneBtn.textContent = t('btnSelectNone');
  expandAllBtn.textContent = t('btnExpandAll');
  collapseAllBtn.textContent = t('btnCollapseAll');

  document.getElementById('statTotalLabel').textContent = t('statTotalLabel');
  document.getElementById('statMdLabel').textContent = t('statMdLabel');
  document.getElementById('statIncludedLabel').textContent = t('statIncludedLabel');

  document.getElementById('filenameLabel').textContent = t('filenameLabel');
  filenameInput.placeholder = t('filenamePlaceholder');
  fsapiHint.textContent = SUPPORTS_SAVE_PICKER ? t('fsapiHintSupported') : t('fsapiHintFallback');

  downloadTxtBtn.textContent = t('btnDownloadTxt');
  downloadPdfBtn.textContent = t('btnDownloadPdf');
  resetBtn.textContent = t('btnReset');

  document.documentElement.lang = currentLang;

  // se o nome do arquivo ainda é o sugerido automaticamente, atualiza para o idioma atual
  if(lastFilenameWasAuto && treeRoot){
    filenameInput.value = `${rootFolderName}-${t('defaultFilenameSuffix')}`;
  }
}

langSelect.addEventListener('change', () => {
  currentLang = langSelect.value;
  applyStaticTexts();
});

filenameInput.addEventListener('input', () => {
  lastFilenameWasAuto = false;
});

function setStatus(msg, type){
  statusEl.textContent = msg;
  statusEl.className = 'status' + (type ? ' ' + type : '');
}
function showProgress(label){
  progressBox.classList.add('show');
  progressText.textContent = label;
  setProgress(0);
}
function setProgress(pct){
  progressFill.style.width = pct + '%';
  progressPct.textContent = Math.round(pct) + '%';
}
function hideProgress(){
  progressBox.classList.remove('show');
}

function sanitizeFilename(name){
  const cleaned = name.trim().replace(/[\\/:*?"<>|]/g, '-').replace(/\s+/g, ' ');
  return cleaned || 'converted-files';
}

function resetUI(){
  mdEntries = [];
  treeRoot = null;
  folderInput.value = '';
  filenameInput.value = '';
  lastFilenameWasAuto = true;
  setStatus('');
  treeWrap.innerHTML = '';
  treeWrap.classList.remove('show');
  listActions.classList.remove('show');
  filenameBox.classList.remove('show');
  summaryEl.style.display = 'none';
  downloadTxtBtn.disabled = true;
  downloadPdfBtn.disabled = true;
  hideProgress();
}
resetBtn.addEventListener('click', resetUI);

/* ---------- construção da árvore ---------- */
function buildTree(fileMetas, rootName){
  const root = { type:'folder', name: rootName, children: [], expanded: true, parent: null, mdEntries: [] };
  const folderIndex = new Map();
  folderIndex.set('', root);

  fileMetas.forEach(meta => {
    const segments = meta.path.split('/');
    segments.shift();
    const fileName = segments.pop();
    let currentKey = '';
    let parent = root;
    for(const seg of segments){
      currentKey = currentKey ? currentKey + '/' + seg : seg;
      let folderNode = folderIndex.get(currentKey);
      if(!folderNode){
        folderNode = { type:'folder', name: seg, children: [], expanded: true, parent, mdEntries: [] };
        folderIndex.set(currentKey, folderNode);
        parent.children.push(folderNode);
      }
      parent = folderNode;
    }
    const fileNode = { type:'file', name: fileName, isMd: meta.isMd, entry: meta.entry, parent };
    parent.children.push(fileNode);
    if(meta.isMd){
      let anc = parent;
      while(anc){ anc.mdEntries.push(meta.entry); anc = anc.parent; }
    }
  });

  function sortNode(node){
    node.children.sort((a,b) => {
      if(a.type !== b.type) return a.type === 'folder' ? -1 : 1;
      return a.name.localeCompare(b.name);
    });
    node.children.forEach(c => { if(c.type === 'folder') sortNode(c); });
  }
  sortNode(root);
  return root;
}

/* ---------- renderização ---------- */
function renderTree(root){
  treeWrap.innerHTML = '';
  renderNode(root, treeWrap, 0);
}

function makeIconSpan(svg){
  const span = document.createElement('span');
  span.className = 'tree-icon';
  span.innerHTML = svg;
  return span;
}

function renderNode(node, container, depth){
  if(node.type === 'folder'){
    const row = document.createElement('div');
    row.className = 'tree-row folder-row';
    row.style.paddingLeft = (10 + depth * 18) + 'px';

    const toggle = document.createElement('span');
    toggle.className = 'tree-toggle' + (node.children.length ? (node.expanded ? ' open' : '') : ' spacer');
    toggle.innerHTML = ICONS.chevron;

    const checkbox = document.createElement('input');
    checkbox.type = 'checkbox';
    if(node.mdEntries.length === 0) checkbox.disabled = true;

    const icon = makeIconSpan(node.expanded ? ICONS.folderOpen : ICONS.folderClosed);

    const name = document.createElement('span');
    name.className = 'tree-name';
    name.textContent = node.name;

    const badge = document.createElement('span');
    badge.className = 'tree-badge';
    badge.textContent = node.mdEntries.length + ' md';

    row.appendChild(toggle);
    row.appendChild(checkbox);
    row.appendChild(icon);
    row.appendChild(name);
    if(node.mdEntries.length > 0) row.appendChild(badge);
    container.appendChild(row);

    const childrenEl = document.createElement('div');
    childrenEl.style.display = node.expanded ? 'block' : 'none';
    container.appendChild(childrenEl);

    node.rowEl = row;
    node.checkboxEl = checkbox;
    node.iconEl = icon;
    node.toggleEl = toggle;
    node.childrenEl = childrenEl;

    function toggleExpand(){
      if(!node.children.length) return;
      node.expanded = !node.expanded;
      childrenEl.style.display = node.expanded ? 'block' : 'none';
      toggle.classList.toggle('open', node.expanded);
      icon.innerHTML = node.expanded ? ICONS.folderOpen : ICONS.folderClosed;
    }
    row.addEventListener('click', (e) => {
      if(e.target === checkbox) return;
      toggleExpand();
    });
    checkbox.addEventListener('click', (e) => e.stopPropagation());
    checkbox.addEventListener('change', () => {
      setSubtreeInclude(node, checkbox.checked);
      updateAncestors(node.parent);
      updateIncludedCount();
    });

    node.children.forEach(child => renderNode(child, childrenEl, depth + 1));
    refreshFolderCheckbox(node);

  } else {
    const row = document.createElement('div');
    row.className = 'tree-row file-row ' + (node.isMd ? 'is-md' : 'non-md');
    row.style.paddingLeft = (10 + depth * 18 + 22) + 'px';

    if(node.isMd){
      const checkbox = document.createElement('input');
      checkbox.type = 'checkbox';
      checkbox.checked = node.entry.include;
      checkbox.addEventListener('click', (e) => e.stopPropagation());
      checkbox.addEventListener('change', () => {
        node.entry.include = checkbox.checked;
        updateAncestors(node.parent);
        updateIncludedCount();
      });
      row.appendChild(checkbox);
      node.checkboxEl = checkbox;
    } else {
      const spacer = document.createElement('span');
      spacer.style.width = '15px';
      spacer.style.flexShrink = '0';
      row.appendChild(spacer);
    }

    const icon = makeIconSpan(node.isMd ? ICONS.fileMd : ICONS.fileOther);
    const name = document.createElement('span');
    name.className = 'tree-name';
    name.textContent = node.name;

    row.appendChild(icon);
    row.appendChild(name);
    container.appendChild(row);
  }
}

/* ---------- seleção em cascata ---------- */
function setSubtreeInclude(node, value){
  if(node.type === 'file'){
    if(node.isMd){
      node.entry.include = value;
      if(node.checkboxEl) node.checkboxEl.checked = value;
    }
  } else {
    node.children.forEach(c => setSubtreeInclude(c, value));
    refreshFolderCheckbox(node);
  }
}

function refreshFolderCheckbox(node){
  if(!node.checkboxEl) return;
  const total = node.mdEntries.length;
  if(total === 0){
    node.checkboxEl.checked = false;
    node.checkboxEl.indeterminate = false;
    return;
  }
  const includedCount = node.mdEntries.filter(e => e.include).length;
  if(includedCount === 0){
    node.checkboxEl.checked = false;
    node.checkboxEl.indeterminate = false;
  } else if(includedCount === total){
    node.checkboxEl.checked = true;
    node.checkboxEl.indeterminate = false;
  } else {
    node.checkboxEl.checked = false;
    node.checkboxEl.indeterminate = true;
  }
}

function updateAncestors(folderNode){
  let cur = folderNode;
  while(cur){
    refreshFolderCheckbox(cur);
    cur = cur.parent;
  }
}

function updateIncludedCount(){
  const included = mdEntries.filter(e => e.include).length;
  statIncluded.textContent = included;
  downloadTxtBtn.disabled = included === 0;
  downloadPdfBtn.disabled = included === 0;
}

/* ---------- expandir / colapsar tudo ---------- */
function setExpandAll(node, value){
  if(node.type !== 'folder') return;
  node.expanded = value;
  if(node.childrenEl) node.childrenEl.style.display = value ? 'block' : 'none';
  if(node.toggleEl) node.toggleEl.classList.toggle('open', value && node.children.length > 0);
  if(node.iconEl) node.iconEl.innerHTML = value ? ICONS.folderOpen : ICONS.folderClosed;
  node.children.forEach(c => setExpandAll(c, value));
}

selectAllBtn.addEventListener('click', () => { setSubtreeInclude(treeRoot, true); updateIncludedCount(); });
selectNoneBtn.addEventListener('click', () => { setSubtreeInclude(treeRoot, false); updateIncludedCount(); });
expandAllBtn.addEventListener('click', () => setExpandAll(treeRoot, true));
collapseAllBtn.addEventListener('click', () => {
  treeRoot.children.forEach(c => setExpandAll(c, false));
});

/* ---------- leitura de arquivos ---------- */
folderInput.addEventListener('change', async (e) => {
  const files = Array.from(e.target.files);
  if(!files.length){
    setStatus(t('statusNoFilesInFolder'), 'error');
    return;
  }
  await processFiles(files);
});

dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', async (e) => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  const items = e.dataTransfer.items;
  if(!items || !items.length) return;

  setStatus(t('statusReadingDragged'));
  const files = [];
  const entries = Array.from(items).map(it => it.webkitGetAsEntry && it.webkitGetAsEntry()).filter(Boolean);

  async function readEntry(entry, path){
    if(entry.isFile){
      await new Promise((resolve) => {
        entry.file((file) => {
          file.relativePath = path + entry.name;
          files.push(file);
          resolve();
        });
      });
    } else if(entry.isDirectory){
      const reader = entry.createReader();
      const all = await new Promise((resolve) => {
        let acc = [];
        function readBatch(){
          reader.readEntries((batch) => {
            if(!batch.length){ resolve(acc); return; }
            acc = acc.concat(batch);
            readBatch();
          });
        }
        readBatch();
      });
      for(const child of all){
        await readEntry(child, path + entry.name + '/');
      }
    }
  }

  for(const entry of entries){
    await readEntry(entry, '');
  }

  if(!files.length){
    setStatus(t('statusNoFilesFound'), 'error');
    return;
  }
  await processFiles(files);
});

async function processFiles(files){
  setStatus(t('statusReadingFiles'));
  treeWrap.innerHTML = '';

  const firstPath = files[0].webkitRelativePath || files[0].relativePath || files[0].name;
  rootFolderName = firstPath.split('/')[0] || 'folder';

  const mdFiles = files.filter(f => {
    const path = f.webkitRelativePath || f.relativePath || f.name;
    return path.toLowerCase().endsWith('.md');
  });

  statTotal.textContent = files.length;
  statMd.textContent = mdFiles.length;
  summaryEl.style.display = 'flex';

  if(!mdFiles.length){
    setStatus(t('statusNoMdFound'), 'error');
    downloadTxtBtn.disabled = true;
    downloadPdfBtn.disabled = true;
    listActions.classList.remove('show');
    treeWrap.classList.remove('show');
    return;
  }

  files.sort((a, b) => {
    const pa = a.webkitRelativePath || a.relativePath || a.name;
    const pb = b.webkitRelativePath || b.relativePath || b.name;
    return pa.localeCompare(pb);
  });

  mdEntries = [];
  const fileMetas = [];
  showProgress(t('progressReading'));
  for(let i = 0; i < files.length; i++){
    const file = files[i];
    const path = file.webkitRelativePath || file.relativePath || file.name;
    const isMd = path.toLowerCase().endsWith('.md');
    if(isMd){
      const text = await file.text();
      const entry = { path, text, include: true };
      mdEntries.push(entry);
      fileMetas.push({ path, isMd: true, entry });
    } else {
      fileMetas.push({ path, isMd: false, entry: null });
    }
    setProgress(((i + 1) / files.length) * 100);
  }
  hideProgress();

  treeRoot = buildTree(fileMetas, rootFolderName);
  renderTree(treeRoot);
  treeWrap.classList.add('show');
  listActions.classList.add('show');
  filenameBox.classList.add('show');
  lastFilenameWasAuto = true;
  filenameInput.value = `${rootFolderName}-${t('defaultFilenameSuffix')}`;
  updateIncludedCount();
  setStatus(t('statusReady', mdFiles.length), 'ok');
}

/* ---------- salvar arquivo (com seletor nativo quando disponível) ---------- */
async function saveFile(blob, filenameNoExt, extension, mimeType){
  const filename = sanitizeFilename(filenameNoExt) + '.' + extension;

  if(SUPPORTS_SAVE_PICKER){
    try{
      const handle = await window.showSaveFilePicker({
        suggestedName: filename,
        types: [{
          description: extension.toUpperCase() + ' file',
          accept: { [mimeType]: ['.' + extension] }
        }]
      });
      const writable = await handle.createWritable();
      await writable.write(blob);
      await writable.close();
      return true;
    } catch(err){
      if(err && err.name === 'AbortError'){
        return false;
      }
    }
  }

  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  return true;
}

/* ---------- geração dos arquivos finais ---------- */
function buildCombinedParts(){
  return mdEntries.filter(e => e.include).map(e => ({ path: e.path, text: e.text }));
}

downloadTxtBtn.addEventListener('click', async () => {
  const included = buildCombinedParts();
  if(!included.length) return;

  downloadTxtBtn.disabled = true;
  showProgress(t('progressBuildingTxt'));

  const parts = [];
  for(let i = 0; i < included.length; i++){
    const e = included[i];
    parts.push(`===== ${e.path} =====\n\n${e.text.trim()}\n`);
    setProgress(((i + 1) / included.length) * 100);
    if(i % 20 === 0) await new Promise(r => setTimeout(r, 0));
  }
  const combinedText = parts.join('\n\n');
  const blob = new Blob([combinedText], { type: 'text/plain;charset=utf-8' });

  hideProgress();
  const saved = await saveFile(blob, filenameInput.value, 'txt', 'text/plain');
  setStatus(saved ? t('statusTxtSaved') : t('statusDownloadCancelled'), saved ? 'ok' : '');
  downloadTxtBtn.disabled = false;
});

downloadPdfBtn.addEventListener('click', async () => {
  const included = buildCombinedParts();
  if(!included.length) return;

  if(!window.jspdf){
    setStatus(t('statusPdfLibError'), 'error');
    return;
  }

  downloadPdfBtn.disabled = true;
  showProgress(t('progressBuildingPdf'));

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'pt', format: 'a4' });
  const margin = 40;
  const pageWidth = doc.internal.pageSize.getWidth();
  const pageHeight = doc.internal.pageSize.getHeight();
  const maxWidth = pageWidth - margin * 2;
  const lineHeight = 13;
  let y = margin;

  for(let i = 0; i < included.length; i++){
    const e = included[i];

    doc.setFont('courier', 'bold');
    doc.setFontSize(10);
    const headerLines = doc.splitTextToSize(`===== ${e.path} =====`, maxWidth);
    for(const hl of headerLines){
      if(y > pageHeight - margin){ doc.addPage(); y = margin; }
      doc.text(hl, margin, y);
      y += lineHeight;
    }
    y += lineHeight / 2;

    doc.setFont('courier', 'normal');
    const bodyLines = doc.splitTextToSize(e.text.trim(), maxWidth);
    for(const bl of bodyLines){
      if(y > pageHeight - margin){ doc.addPage(); y = margin; }
      doc.text(bl, margin, y);
      y += lineHeight;
    }
    y += lineHeight * 1.2;

    setProgress(((i + 1) / included.length) * 100);
    if(i % 5 === 0) await new Promise(r => setTimeout(r, 0));
  }

  const pdfBlob = doc.output('blob');

  hideProgress();
  const saved = await saveFile(pdfBlob, filenameInput.value, 'pdf', 'application/pdf');
  setStatus(saved ? t('statusPdfSaved') : t('statusDownloadCancelled'), saved ? 'ok' : '');
  downloadPdfBtn.disabled = false;
});

/* ---------- inicialização ---------- */
applyStaticTexts();

/* ---------- service worker (PWA) ---------- */
if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js').catch(() => {});
  });
}
